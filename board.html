<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETF레이더 — 커뮤니티</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
:root{--red:#e8001a;--navy:#0a1628;--blue:#1a5dff;--bg:#f0f2f5;--white:#fff;--border:#d9dbe0;--text:#1a1a1a;--sub:#666;--hot:#ff4500;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;overscroll-behavior-y:contain}
a{text-decoration:none;color:inherit}
#ptr-indicator{position:fixed;top:0;left:0;width:100%;z-index:999;display:flex;justify-content:center;padding:8px;transform:translateY(-100%);transition:transform 0.2s;pointer-events:none}
#ptr-indicator.visible{transform:translateY(60px)}
#ptr-circle{width:32px;height:32px;border:3px solid #eee;border-top-color:var(--red);border-radius:50%}
#ptr-circle.spinning{animation:spin 0.7s linear infinite}
#header{background:var(--navy);border-bottom:3px solid var(--red);position:sticky;top:0;z-index:200}
#header-inner{max-width:800px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
#logo{font-size:18px;font-weight:900;color:#fff;letter-spacing:-0.02em}
#logo em{color:var(--red);font-style:normal}
#board-name{font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:0.1em}
#news-link{font-size:11px;color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.2);padding:4px 10px;border-radius:2px}
#board-header{background:#fff;border-bottom:2px solid var(--red);max-width:800px;margin:0 auto}
#board-tabs{display:flex;padding:0 16px}
.board-tab{padding:11px 16px;font-size:13px;font-weight:500;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap}
.board-tab.active{color:var(--red);border-bottom-color:var(--red);font-weight:700}
#notice-bar{background:#fff8f8;border-bottom:1px solid #ffd0d0;padding:8px 16px;max-width:800px;margin:0 auto;display:flex;align-items:center;gap:8px}
.notice-badge{background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:2px;flex-shrink:0}
.notice-text{font-size:12px;color:#c00;font-weight:500}
#container{max-width:800px;margin:0 auto;padding:8px 0 40px}

/* 오늘의 토론 */
#today-section{background:linear-gradient(135deg,#0a1628,#122040);margin-bottom:4px;border-radius:0;overflow:hidden;}
#today-header{padding:10px 16px 6px;display:flex;align-items:center;justify-content:space-between}
#today-badge{font-size:9px;font-weight:700;color:#fff;background:var(--red);padding:2px 8px;border-radius:10px;letter-spacing:0.05em}
#today-date{font-size:10px;color:rgba(255,255,255,0.4)}
#today-content{padding:0 16px 14px}
#today-topic{font-size:15px;font-weight:700;color:#fff;line-height:1.5;margin-bottom:12px;word-break:keep-all;font-family:'Noto Serif KR',serif}
#today-context{font-size:12px;color:rgba(255,255,255,0.55);line-height:1.6;margin-bottom:14px;word-break:keep-all}

/* 여론조사 */
#poll-section{background:#fff;margin-bottom:4px;border-top:2px solid #f0a500;}
#poll-header{padding:10px 16px 6px;display:flex;align-items:center;gap:8px}
#poll-badge{font-size:9px;font-weight:700;color:#fff;background:#f0a500;padding:2px 8px;border-radius:10px}
#poll-question{font-size:14px;font-weight:700;color:var(--text);padding:4px 16px 12px;line-height:1.5;word-break:keep-all}
.poll-options{padding:0 16px 14px;display:flex;flex-direction:column;gap:8px}
.poll-btn{width:100%;padding:10px 16px;border-radius:6px;border:1.5px solid var(--border);background:#fff;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-align:left;transition:all 0.15s;color:var(--text);display:flex;align-items:center;justify-content:space-between;}
.poll-btn:hover{border-color:var(--red);background:#fff5f5}
.poll-btn.voted{cursor:default;}
.poll-btn.voted-yes{border-color:#1a6ce8;background:#f0f6ff;color:#1a6ce8;}
.poll-btn.voted-no{border-color:var(--red);background:#fff0f2;color:var(--red);}
.poll-btn.voted-hold{border-color:#f0a500;background:#fffbf0;color:#d48800;}
.poll-bar-wrap{height:4px;background:#f0f2f5;border-radius:2px;margin:0 16px 4px;overflow:hidden}
.poll-bar{height:100%;border-radius:2px;transition:width 0.5s ease}
.poll-result-row{display:flex;justify-content:space-between;padding:2px 16px;font-size:11px;color:var(--sub)}
.poll-total{font-size:11px;color:#bbb;text-align:center;padding:4px 16px 14px}

#hot-section{background:#fff;margin-bottom:4px;border-top:2px solid var(--hot)}
#hot-header{padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
#hot-header span{font-size:12px;font-weight:700;color:var(--hot)}
.hot-item{padding:8px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background 0.1s}
.hot-item:hover{background:#fff8f0}
.hot-num{font-size:11px;font-weight:700;color:var(--hot);width:16px;flex-shrink:0}
.hot-title{font-size:13px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hot-count{font-size:11px;color:#ff6b35;flex-shrink:0}
#post-list-section{background:#fff}
#list-header{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
#total-count{font-size:12px;color:var(--sub)}
#total-count strong{color:var(--red)}
#write-btn{background:var(--red);color:#fff;border:none;padding:7px 14px;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border-radius:2px}
.post-row{padding:11px 16px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background 0.1s}
.post-row:hover{background:#f8f9ff}
.post-row.hot-post .post-title{color:var(--hot)}
.post-title-line{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.post-title{font-size:13px;color:var(--text);flex:1;word-break:keep-all;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.comment-cnt{font-size:11px;color:var(--blue);font-weight:700;flex-shrink:0}
.post-meta-line{display:flex;align-items:center;gap:8px;margin-top:3px}
.post-num{font-size:11px;color:#bbb}
.post-nick{font-size:11px;color:var(--sub)}
.post-time{font-size:11px;color:#bbb}
.post-views{font-size:11px;color:#bbb}
.post-likes{font-size:11px;color:var(--blue)}
.new-dot{width:5px;height:5px;background:var(--red);border-radius:50%;flex-shrink:0;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.cat-tag{font-size:10px;color:var(--red);background:#fff0f2;padding:1px 5px;border-radius:2px;flex-shrink:0}
#pagination{display:flex;justify-content:center;gap:4px;padding:16px}
.page-btn{padding:6px 10px;border:1px solid var(--border);background:#fff;font-family:'Noto Sans KR',sans-serif;font-size:12px;cursor:pointer;border-radius:2px;color:var(--sub)}
.page-btn.active{background:var(--red);color:#fff;border-color:var(--red)}
#search-bar{padding:10px 16px;background:#fff;border-top:1px solid var(--border);display:flex;gap:6px}
#search-input{flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:2px;font-family:'Noto Sans KR',sans-serif;font-size:12px;outline:none}
#search-input:focus{border-color:var(--red)}
#search-btn{background:var(--navy);color:#fff;border:none;padding:7px 14px;font-family:'Noto Sans KR',sans-serif;font-size:12px;cursor:pointer;border-radius:2px}
#write-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:500;align-items:flex-end}
#write-modal.show{display:flex}
#write-box{background:#fff;width:100%;max-width:800px;margin:0 auto;border-radius:12px 12px 0 0;padding:20px 16px;max-height:85vh;overflow-y:auto}
#write-title-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
#write-title-bar h3{font-size:15px;font-weight:700}
#close-write{background:none;border:none;font-size:20px;cursor:pointer;color:var(--sub);padding:4px}
.write-row{margin-bottom:10px}
.write-row input,.write-row textarea,.write-row select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:4px;font-family:'Noto Sans KR',sans-serif;font-size:13px;outline:none;transition:border 0.15s}
.write-row input:focus,.write-row textarea:focus{border-color:var(--red)}
.write-row textarea{height:120px;resize:none;line-height:1.7}
#submit-btn{background:var(--red);color:#fff;border:none;padding:12px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;border-radius:4px;cursor:pointer;width:100%}
.char-count{font-size:11px;color:#bbb;text-align:right;margin-top:4px}
#detail-view{display:none;background:#fff;max-width:800px;margin:0 auto;}
#detail-nav{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
#detail-nav-left{display:flex;align-items:center;gap:8px}
#back-btn{background:none;border:1px solid var(--border);padding:5px 12px;font-family:'Noto Sans KR',sans-serif;font-size:12px;cursor:pointer;border-radius:2px;color:var(--sub)}
#detail-category{font-size:11px;color:var(--red);font-weight:700;background:#fff0f2;padding:2px 8px;border-radius:10px}
#admin-delete-btn{background:none;border:1px solid #ffcccc;color:#cc0000;padding:5px 12px;font-family:'Noto Sans KR',sans-serif;font-size:11px;cursor:pointer;border-radius:2px;font-weight:700}
#detail-content-box{padding:16px}
#detail-title{font-size:18px;font-weight:700;line-height:1.5;margin-bottom:10px;word-break:keep-all}
#detail-meta{display:flex;align-items:center;gap:10px;font-size:11px;color:#999;padding-bottom:12px;border-bottom:1px solid var(--border);margin-bottom:16px;flex-wrap:wrap}
.comment-ip{font-size:10px;color:#ccc;background:#f5f5f5;padding:1px 5px;border-radius:2px}
#detail-body{font-size:14px;line-height:1.9;color:var(--text);white-space:pre-wrap;min-height:80px}
#detail-actions{display:flex;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);justify-content:center}
.vote-btn{display:flex;align-items:center;gap:6px;padding:10px 24px;border-radius:40px;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:2px solid var(--border);background:#fff;transition:all 0.15s;min-width:80px;justify-content:center}
.vote-btn.up.voted{background:#fff0f2;border-color:var(--red);color:var(--red)}
.vote-btn.down.voted{background:#f0f4ff;border-color:var(--blue);color:var(--blue)}
#comments-section{background:#f8f9fa;border-top:6px solid var(--bg)}
#comments-header{padding:12px 16px;font-size:13px;font-weight:700;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
#comment-cnt-badge{background:var(--red);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px}
.comment-item{background:#fff;border-bottom:1px solid var(--border)}
.comment-item:nth-child(even){background:#fafafa}
.comment-main{padding:12px 16px}
.comment-header{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.comment-nick{font-size:12px;font-weight:700;color:var(--navy)}
.comment-time{font-size:11px;color:#bbb}
.comment-body{font-size:13px;line-height:1.6;color:var(--text)}
.comment-footer{display:flex;align-items:center;gap:10px;margin-top:6px}
.reply-btn{background:none;border:none;font-size:11px;color:#aaa;cursor:pointer;font-family:'Noto Sans KR',sans-serif;padding:0}
.reply-btn:hover{color:var(--blue)}
.comment-del-btn{background:none;border:1px solid #ffcccc;color:#cc0000;font-size:10px;padding:2px 7px;border-radius:2px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;display:none}
.admin-mode .comment-del-btn{display:inline-block}
.replies{background:#f5f7fa}
.reply-item{padding:10px 16px 10px 32px;border-top:1px solid #eee;display:flex;gap:8px}
.reply-item::before{content:'↳';font-size:13px;color:#bbb;flex-shrink:0;margin-top:1px}
.reply-content{flex:1}
.reply-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.reply-nick{font-size:12px;font-weight:700;color:#555}
.reply-time{font-size:11px;color:#bbb}
.reply-body{font-size:13px;line-height:1.6;color:var(--text)}
.reply-del-btn{background:none;border:1px solid #ffcccc;color:#cc0000;font-size:9px;padding:1px 5px;border-radius:2px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:4px;display:none}
.admin-mode .reply-del-btn{display:inline-block}
.reply-form{background:#eef0f5;border-top:1px solid var(--border);padding:10px 16px 10px 32px;display:none;gap:6px}
.reply-form.open{display:flex}
.reply-input{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:4px;font-family:'Noto Sans KR',sans-serif;font-size:12px;outline:none}
.reply-input:focus{border-color:var(--blue)}
.reply-submit{background:var(--blue);color:#fff;border:none;padding:8px 12px;font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:700;border-radius:4px;cursor:pointer;white-space:nowrap}
#comment-write{padding:12px 16px;background:#fff;border-top:1px solid var(--border)}
#comment-write-row{display:flex;gap:6px}
#comment-input{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:4px;font-family:'Noto Sans KR',sans-serif;font-size:13px;outline:none}
#comment-input:focus{border-color:var(--red)}
#comment-submit{background:var(--navy);color:#fff;border:none;padding:10px 16px;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;border-radius:4px;cursor:pointer;white-space:nowrap}
#detail-nav-btns{display:flex;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border);background:#fff}
.nav-post-btn{background:none;border:1px solid var(--border);padding:7px 14px;font-family:'Noto Sans KR',sans-serif;font-size:12px;cursor:pointer;border-radius:2px;color:var(--sub)}
#admin-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:600;align-items:center;justify-content:center}
#admin-modal.show{display:flex}
#admin-box{background:#fff;border-radius:8px;padding:24px;width:280px}
#admin-box h3{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--navy)}
#admin-pw-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:4px;font-family:'Noto Sans KR',sans-serif;font-size:13px;outline:none;margin-bottom:10px}
#admin-pw-input:focus{border-color:var(--red)}
#admin-confirm-btn{width:100%;padding:10px;background:var(--navy);color:#fff;border:none;border-radius:4px;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px}
#admin-cancel-btn{width:100%;padding:8px;background:none;border:1px solid var(--border);border-radius:4px;font-family:'Noto Sans KR',sans-serif;font-size:12px;cursor:pointer;color:var(--sub)}
#admin-error{font-size:11px;color:var(--red);text-align:center;margin-top:6px;display:none}
.loading{text-align:center;padding:40px;color:#ccc}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #eee;border-top-color:var(--red);border-radius:50%;animation:spin 0.7s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="ptr-indicator"><div id="ptr-circle"></div></div>
<div id="header">
  <div id="header-inner">
    <div><a href="/"><div id="logo">ETF<em>레이더</em></div></a><div id="board-name">커뮤니티</div></div>
    <a href="/" id="news-link">← 뉴스홈</a>
  </div>
</div>
<div id="list-view">
  <div id="board-header">
    <div id="board-tabs">
      <div class="board-tab active" onclick="setSort('latest',this)">최신순</div>
      <div class="board-tab" onclick="setSort('hot',this)">인기순</div>
      <div class="board-tab" onclick="setSort('comments',this)">댓글많은순</div>
    </div>
  </div>
  <div id="notice-bar">
    <span class="notice-badge">공지</span>
    <span class="notice-text">ETF·펀드·주식 관련 자유롭게 이야기해요. 욕설·도배·광고는 삭제됩니다.</span>
  </div>
  <div id="container">

    <!-- 오늘의 토론 -->
    <div id="today-section">
      <div id="today-header">
        <span id="today-badge">🔥 오늘의 토론</span>
        <span id="today-date"></span>
      </div>
      <div id="today-content">
        <div id="today-topic" style="color:rgba(255,255,255,0.4);font-size:13px;">브리핑 불러오는 중...</div>
        <div id="today-context"></div>
        <button onclick="joinTodayDiscussion()" style="background:var(--red);color:#fff;border:none;padding:8px 18px;border-radius:20px;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;cursor:pointer;">💬 토론 참여하기</button>
      </div>
    </div>

    <!-- 여론조사 -->
    <div id="poll-section">
      <div id="poll-header">
        <span id="poll-badge">📊 오늘의 ETF 투표</span>
      </div>
      <div id="poll-question">불러오는 중...</div>
      <div class="poll-options" id="poll-options"></div>
      <div id="poll-result" style="display:none;">
        <div id="poll-bars"></div>
        <div class="poll-total" id="poll-total"></div>
      </div>
    </div>

    <div id="hot-section">
      <div id="hot-header"><span>🔥 실시간 인기글</span></div>
      <div id="hot-list"><div class="loading"><div class="spinner"></div></div></div>
    </div>
    <div id="post-list-section">
      <div id="list-header">
        <span id="total-count">불러오는 중...</span>
        <button id="write-btn" onclick="openWrite()">✏️ 글쓰기</button>
      </div>
      <div id="posts-container"><div class="loading"><div class="spinner"></div></div></div>
      <div id="pagination"></div>
      <div id="search-bar">
        <input type="text" id="search-input" placeholder="제목·내용 검색" onkeydown="if(event.key==='Enter')searchPosts()">
        <button id="search-btn" onclick="searchPosts()">검색</button>
      </div>
    </div>
  </div>
</div>

<div id="detail-view">
  <div id="detail-nav">
    <div id="detail-nav-left">
      <button id="back-btn" onclick="showList()">← 목록</button>
      <span id="detail-category"></span>
    </div>
    <div style="display:flex;gap:6px;align-items:center;">
      <button onclick="loadComments(currentPostId)" style="background:none;border:1px solid var(--border);padding:5px 10px;font-family:'Noto Sans KR',sans-serif;font-size:12px;cursor:pointer;border-radius:2px;color:var(--sub);">↻ 새로고침</button>
      <button id="admin-delete-btn" onclick="adminDeletePost()">🗑 삭제</button>
    </div>
  </div>
  <div id="detail-content-box">
    <div id="detail-title"></div>
    <div id="detail-meta"></div>
    <div id="detail-body"></div>
    <div id="detail-actions">
      <button class="vote-btn up" onclick="vote('up')">👍 추천 <span id="up-count">0</span></button>
      <button class="vote-btn down" onclick="vote('down')">👎 비추 <span id="down-count">0</span></button>
    </div>
  </div>
  <div id="comments-section">
    <div id="comments-header">댓글 <span id="comment-cnt-badge">0</span></div>
    <div id="comments-container"></div>
    <div id="comment-write">
      <div id="comment-write-row">
        <input type="text" id="comment-input" placeholder="댓글을 입력하세요 (익명)" maxlength="200">
        <button id="comment-submit" onclick="submitComment()">등록</button>
      </div>
    </div>
  </div>
  <div id="detail-nav-btns">
    <button class="nav-post-btn" onclick="showList()">목록으로</button>
    <button class="nav-post-btn" onclick="openWrite()">✏️ 글쓰기</button>
  </div>
</div>

<div id="write-modal" onclick="if(event.target===this)closeWrite()">
  <div id="write-box">
    <div id="write-title-bar">
      <h3>익명 글쓰기</h3>
      <button id="close-write" onclick="closeWrite()">✕</button>
    </div>
    <div class="write-row">
      <select id="post-category">
        <option value="자유">💬 자유</option>
        <option value="ETF">📊 ETF</option>
        <option value="펀드">💼 펀드</option>
        <option value="주식">📈 주식</option>
        <option value="질문">❓ 질문</option>
        <option value="정보">💡 정보</option>

function getTodayPoll() {
  const dayIdx = new Date().getDay();
  return POLLS[dayIdx % POLLS.length];
}

function renderPoll() {
  const poll = getTodayPoll();
  const voted = localStorage.getItem(poll.id);
  document.getElementById('poll-question').textContent = poll.q;

  // 현재 투표 수 (로컬)
  const counts = JSON.parse(localStorage.getItem(poll.id + '_counts') || 'null') || poll.opts.map(() => Math.floor(Math.random() * 30) + 5);

  if (voted !== null) {
    showPollResult(poll, counts, parseInt(voted));
  } else {
    document.getElementById('poll-options').innerHTML = poll.opts.map((o, i) => `
      <button class="poll-btn" onclick="votePoll(${i})">${o}</button>
    `).join('');
    document.getElementById('poll-result').style.display = 'none';
  }
}

function votePoll(idx) {
  const poll = getTodayPoll();
  const counts = JSON.parse(localStorage.getItem(poll.id + '_counts') || 'null') || poll.opts.map(() => Math.floor(Math.random() * 30) + 5);
  counts[idx]++;
  localStorage.setItem(poll.id, idx);
  localStorage.setItem(poll.id + '_counts', JSON.stringify(counts));
  showPollResult(poll, counts, idx);
}

function showPollResult(poll, counts, votedIdx) {
  const total = counts.reduce((a, b) => a + b, 0);
  const colors = ['#1a6ce8', '#e8001a', '#f0a500', '#1db954'];
  document.getElementById('poll-options').innerHTML = poll.opts.map((o, i) => {
    const pct = Math.round(counts[i] / total * 100);
    return `<button class="poll-btn ${i === votedIdx ? ['voted-yes','voted-no','voted-hold'][i] || 'voted-yes' : ''} voted" disabled>
      <span>${o}</span><span style="font-size:12px;font-weight:700;">${pct}%</span>
    </button>`;
  }).join('');

  const bars = poll.opts.map((o, i) => {
    const pct = Math.round(counts[i] / total * 100);
    return `<div class="poll-bar-wrap"><div class="poll-bar" style="width:${pct}%;background:${colors[i % colors.length]}"></div></div>
    <div class="poll-result-row"><span>${o}</span><span>${counts[i]}표 (${pct}%)</span></div>`;
  }).join('');

  document.getElementById('poll-bars').innerHTML = bars;
  document.getElementById('poll-total').textContent = `총 ${total}명 참여`;
  document.getElementById('poll-result').style.display = 'block';
}

async function loadPosts(){
  document.getElementById('posts-container').innerHTML='<div class="loading"><div class="spinner"></div></div>';

    let url=`${SUPABASE_URL}/rest/v1/posts?select=*`;

    else url+=`&order=comment_count.desc`;
    url+=`&limit=${PAGE_SIZE}&offset=${(currentPage-1)*PAGE_SIZE}`;
    const r=await fetch(url,{headers:{...H,'Prefer':'count=exact'}});

    const cr=r.headers?.get('content-range');
    const total=cr?parseInt(cr.split('/')[1]):posts.length;
    document.getElementById('total-count').innerHTML=`전체 <strong>${total}</strong>개의 글`;

    }).join('');
    const totalPages=Math.ceil(total/PAGE_SIZE);

function showList(){document.getElementById('detail-view').style.display='none';document.getElementById('list-view').style.display='block';loadPosts();loadHotPosts();}
async function vote(type){const voteKey=`vote_${currentPostId}`;const already=localStorage.getItem(voteKey);if(already){alert(already==='up'?'이미 추천한 글입니다.':'이미 비추천한 글입니다.');return;}const btn=document.querySelector(`.vote-btn.${type==='up'?'up':'down'}`);btn.classList.add('voted');const r=await fetch(`${SUPABASE_URL}/rest/v1/posts?id=eq.${currentPostId}&select=likes,dislikes`,{headers:H});const p=(await r.json())[0];const field=type==='up'?'likes':'dislikes';const val=(p[field]||0)+1;await fetch(`${SUPABASE_URL}/rest/v1/posts?id=eq.${currentPostId}`,{method:'PATCH',headers:H,body:JSON.stringify({[field]:val})});document.getElementById(type==='up'?'up-count':'down-count').textContent=val;localStorage.setItem(voteKey,type);if(type==='up')loadHotPosts();}
async function loadComments(postId){const r=await fetch(`${SUPABASE_URL}/rest/v1/comments?post_id=eq.${postId}&order=created_at.asc`,{headers:H});const all=await r.json();const parents=all.filter(c=>!c.parent_id);const replies=all.filter(c=>c.parent_id);document.getElementById('comment-cnt-badge').textContent=all.length;const container=document.getElementById('comments-container');if(!parents.length){container.innerHTML='<div style="padding:20px;text-align:center;color:#ccc;font-size:13px">첫 댓글을 남겨보세요!</div>';return;}container.className=isAdmin?'admin-mode':'';container.innerHTML=parents.map(c=>{const myReplies=replies.filter(r=>r.parent_id===c.id);return`<div class="comment-item"><div class="comment-main"><div class="comment-header"><span class="comment-nick">${c.nickname||'익명'}</span><span class="comment-ip">${fakeIp()}</span><span class="comment-time">${timeAgo(c.created_at)}</span></div><div class="comment-body">${c.content}</div><div class="comment-footer"><button class="reply-btn" onclick="toggleReplyForm(${c.id})">↩ 답글</button><button class="comment-del-btn" onclick="adminDeleteComment(${c.id})">삭제</button></div></div>${myReplies.length?`<div class="replies">${myReplies.map(r=>`<div class="reply-item"><div class="reply-content"><div class="reply-header"><span class="reply-nick">${r.nickname||'익명'}</span><span class="reply-time">${timeAgo(r.created_at)}</span></div><div class="reply-body">${r.content}</div><button class="reply-del-btn" onclick="adminDeleteReply(${r.id})">삭제</button></div></div>`).join('')}</div>`:''}<div class="reply-form" id="reply-form-${c.id}"><input type="text" class="reply-input" id="reply-input-${c.id}" placeholder="답글을 입력하세요 (익명)" maxlength="200" onkeydown="if(event.key==='Enter')submitReply(${c.id})"><button class="reply-submit" onclick="submitReply(${c.id})">등록</button></div></div>`;}).join('');}
function toggleReplyForm(commentId){const form=document.getElementById(`reply-form-${commentId}`);const isOpen=form.classList.contains('open');document.querySelectorAll('.reply-form').forEach(f=>f.classList.remove('open'));if(!isOpen){form.classList.add('open');document.getElementById(`reply-input-${commentId}`).focus();}}
async function submitReply(parentId){const input=document.getElementById(`reply-input-${parentId}`);const content=input.value.trim();if(!content||content.length<2)return;await fetch(`${SUPABASE_URL}/rest/v1/comments`,{method:'POST',headers:H,body:JSON.stringify({post_id:currentPostId,parent_id:parentId,content,nickname:randomNick()})});const r=await fetch(`${SUPABASE_URL}/rest/v1/posts?id=eq.${currentPostId}&select=comment_count`,{headers:H});const p=(await r.json())[0];await fetch(`${SUPABASE_URL}/rest/v1/posts?id=eq.${currentPostId}`,{method:'PATCH',headers:H,body:JSON.stringify({comment_count:(p.comment_count||0)+1})});await loadComments(currentPostId);}
async function submitComment(){const content=document.getElementById('comment-input').value.trim();if(!content||content.length<2)return;const btn=document.getElementById('comment-submit');btn.textContent='...';btn.disabled=true;await fetch(`${SUPABASE_URL}/rest/v1/comments`,{method:'POST',headers:H,body:JSON.stringify({post_id:currentPostId,content,nickname:randomNick()})});const r=await fetch(`${SUPABASE_URL}/rest/v1/posts?id=eq.${currentPostId}&select=comment_count`,{headers:H});const p=(await r.json())[0];await fetch(`${SUPABASE_URL}/rest/v1/posts?id=eq.${currentPostId}`,{method:'PATCH',headers:H,body:JSON.stringify({comment_count:(p.comment_count||0)+1})});document.getElementById('comment-input').value='';await loadComments(currentPostId);btn.textContent='등록';btn.disabled=false;}
document.getElementById('comment-input').addEventListener('keydown',e=>{if(e.key==='Enter')submitComment();});

// 초기 로드
loadTodayDiscussion();
renderPoll();
loadPosts();
loadHotPosts();
</script>
