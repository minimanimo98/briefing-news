<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETF 레이더</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fff;color:#111;font-family:'Noto Sans KR',sans-serif}
a{text-decoration:none;color:inherit}
#header{border-bottom:3px solid #111;padding:16px 20px 12px;text-align:center;position:sticky;top:0;background:#fff;z-index:100}
#logo{font-family:'Noto Serif KR',serif;font-size:28px;font-weight:700;letter-spacing:-0.02em}
#logo em{color:#0057ff;font-style:normal}
#tagline{font-size:10px;color:#aaa;letter-spacing:0.15em;margin-top:2px}
#tabs{display:flex;overflow-x:auto;border-bottom:1px solid #e8e8e8;background:#fff;position:sticky;top:65px;z-index:99}
#tabs::-webkit-scrollbar{display:none}
.tab{padding:11px 18px;font-size:12px;font-weight:500;color:#aaa;border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;font-family:'Noto Sans KR',sans-serif}
.tab.active{color:#0057ff;border-bottom-color:#0057ff}
#news{max-width:680px;margin:0 auto;padding:0 20px}
.card{padding:16px 0;border-bottom:1px solid #e8e8e8;display:flex;gap:12px}
.card-rank{font-size:22px;font-weight:700;color:#e8e8e8;font-family:Georgia,serif;flex-shrink:0;width:28px;text-align:center;padding-top:2px}
.card-body{flex:1;min-width:0}
.card-meta{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.source{font-size:10px;font-weight:500;letter-spacing:0.06em;color:#0057ff}
.time{font-size:10px;color:#bbb}
.card-title{font-size:15px;font-weight:700;line-height:1.45;color:#111;font-family:'Noto Serif KR',serif;word-break:keep-all}
.card.featured .card-title{font-size:19px}
.card.featured .card-rank{font-size:32px}
.card-desc{font-size:12px;color:#888;margin-top:5px;line-height:1.55}
#loading{text-align:center;padding:60px;color:#ccc;font-size:13px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #eee;border-top-color:#0057ff;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
#footer{text-align:center;padding:30px 20px;color:#ccc;font-size:11px;border-top:1px solid #e8e8e8;margin-top:20px;line-height:2}
#load-more{display:block;width:100%;padding:14px;font-family:'Noto Sans KR',sans-serif;font-size:13px;background:#fff;border:1px solid #ddd;color:#555;cursor:pointer;margin:16px 0}
</style>
</head>
<body>
<div id="header">
  <div id="logo">ETF<em>레이더</em></div>
  <div id="tagline">ETF · 펀드 · 주식 뉴스</div>
</div>
<div id="tabs">
  <button class="tab active" onclick="switchTab(0,this)">전체</button>
  <button class="tab" onclick="switchTab(1,this)">ETF</button>
  <button class="tab" onclick="switchTab(2,this)">펀드</button>
  <button class="tab" onclick="switchTab(3,this)">주식</button>
</div>
<div id="news"><div id="loading"><div class="spinner"></div><br>뉴스 불러오는 중...</div></div>
<div id="footer">ETF레이더 · RSS 기반 뉴스<br>원문 저작권은 각 언론사에 귀속<br><span id="update-time"></span></div>
<script>
const FEEDS={
  0:[
    {name:"한국경제",url:"https://www.hankyung.com/feed/stock"},
    {name:"연합뉴스",url:"https://www.yonhapnews.co.kr/rss/stock.xml"},
    {name:"머니투데이",url:"https://rss.mt.co.kr/mt_news.xml"}
  ],
  1:[
    {name:"한국경제",url:"https://www.hankyung.com/feed/stock"},
    {name:"연합뉴스",url:"https://www.yonhapnews.co.kr/rss/economy.xml"},
    {name:"머니투데이",url:"https://rss.mt.co.kr/mt_news.xml"}
  ],
  2:[
    {name:"한국경제",url:"https://www.hankyung.com/feed/finance"},
    {name:"머니투데이",url:"https://rss.mt.co.kr/mt_news.xml"},
    {name:"연합뉴스",url:"https://www.yonhapnews.co.kr/rss/economy.xml"}
  ],
  3:[
    {name:"한국경제",url:"https://www.hankyung.com/feed/stock"},
    {name:"연합뉴스",url:"https://www.yonhapnews.co.kr/rss/stock.xml"},
    {name:"머니투데이",url:"https://rss.mt.co.kr/mt_news.xml"}
  ]
};
let curTab=0,allArticles=[],displayCount=15;
function switchTab(i,el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');curTab=i;displayCount=15;loadFeeds();}
function timeAgo(d){const m=Math.floor((Date.now()-new Date(d))/60000);if(m<1)return'방금';if(m<60)return m+'분 전';if(m<1440)return Math.floor(m/60)+'시간 전';return Math.floor(m/1440)+'일 전';}
function strip(h){return h?h.replace(/<[^>]*>/g,'').replace(/&[a-z#0-9]+;/gi,' ').replace(/\s+/g,' ').trim():'';}

async function fetchOne(s){
  try{
    const r=await fetch(`/api/rss?url=${encodeURIComponent(s.url)}`,{signal:AbortSignal.timeout(8000)});
    const text=await r.text();
    const parser=new DOMParser();
    const xml=parser.parseFromString(text,'text/xml');
    const items=[...xml.querySelectorAll('item')];
    return items.slice(0,20).map(item=>{
      const title=item.querySelector('title')?.textContent?.trim()||'';
      const link=item.querySelector('link')?.textContent?.trim()||item.querySelector('guid')?.textContent||'';
      const pubDate=item.querySelector('pubDate')?.textContent||new Date().toISOString();
      const desc=strip(item.querySelector('description')?.textContent||'');
      return{title,link,pubDate,description:desc,sourceName:s.name};
    }).filter(a=>a.title);
  }catch(e){return[];}
}

async function loadFeeds(){
  document.getElementById('news').innerHTML='<div id="loading"><div class="spinner"></div><br>뉴스 불러오는 중...</div>';
  const sources=FEEDS[curTab];
  const all=[];
  for(const s of sources){
    const items=await fetchOne(s);
    items.forEach(item=>all.push(item));
    if(all.length>0){
      all.sort((a,b)=>new Date(b.pubDate)-new Date(a.pubDate));
      allArticles=[...all];
      renderArticles();
    }
  }
  if(!all.length)document.getElementById('news').innerHTML='<div id="loading">잠시 후 다시 시도해주세요.</div>';
  document.getElementById('update-time').textContent='업데이트: '+new Date().toLocaleTimeString('ko-KR');
}

function renderArticles(){
  const items=allArticles.slice(0,displayCount);
  let html='';
  items.forEach((a,i)=>{
    html+=`<a href="${a.link}" target="_blank" rel="noopener"><div class="card${i===0?' featured':''}"><div class="card-rank">${i+1}</div><div class="card-body"><div class="card-meta"><span class="source">${a.sourceName}</span><span class="time">${timeAgo(a.pubDate)}</span></div><div class="card-title">${a.title}</div>${i<5&&a.description?`<div class="card-desc">${a.description.slice(0,100)}</div>`:''}</div></div></a>`;
  });
  if(allArticles.length>displayCount)html+=`<button id="load-more" onclick="loadMore()">더 보기 (${allArticles.length-displayCount}개 남음)</button>`;
  document.getElementById('news').innerHTML=html;
}
function loadMore(){displayCount+=15;renderArticles();}
loadFeeds();
</script>
</body>
</html>
