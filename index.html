    "https://news.google.com/rss/search?q=공모펀드+운용사+설정액&hl=ko&gl=KR&ceid=KR:ko",
    "https://news.google.com/rss/search?q=사모펀드+헤지펀드+수익률&hl=ko&gl=KR&ceid=KR:ko",
    "https://news.google.com/rss/search?q=TDF+리츠+펀드매니저&hl=ko&gl=KR&ceid=KR:ko"
  ],
  stock: [
    "https://news.google.com/rss/search?q=코스피+코스닥+시황+오늘&hl=ko&gl=KR&ceid=KR:ko",
    "https://news.google.com/rss/search?q=종목+주가+매수+목표주가&hl=ko&gl=KR&ceid=KR:ko",
    "https://news.google.com/rss/search?q=실적+배당+공모주+상장&hl=ko&gl=KR&ceid=KR:ko"
  ]
};

const SOURCE_MAP = {
  'hankyung.com':'한국경제','mk.co.kr':'매일경제','chosun.com':'조선일보',
  'joongang.co.kr':'중앙일보','donga.com':'동아일보','hani.co.kr':'한겨레',
  'yonhapnews.co.kr':'연합뉴스','yna.co.kr':'연합뉴스','mt.co.kr':'머니투데이',
  'edaily.co.kr':'이데일리','sedaily.com':'서울경제','fnnews.com':'파이낸셜뉴스',
  'heraldcorp.com':'헤럴드경제','asiae.co.kr':'아시아경제','news1.kr':'뉴스1',
  'newsis.com':'뉴시스','etnews.com':'전자신문','zdnet.co.kr':'ZDNet',
  'bloter.net':'블로터','khan.co.kr':'경향신문','hankookilbo.com':'한국일보',
  'kmib.co.kr':'국민일보','seoul.co.kr':'서울신문','jtbc.co.kr':'JTBC',
  'mbc.co.kr':'MBC','sbs.co.kr':'SBS','kbs.co.kr':'KBS'
};

function cleanSource(raw) {
  for (const [domain, name] of Object.entries(SOURCE_MAP)) {
    if (raw.toLowerCase().includes(domain)) return name;
  }
  if (raw.includes('.')) return raw.split('.')[0].toUpperCase();
  return raw;
}

function parseTitle(raw) {
  const match = raw.match(/^(.*?)\s+-\s+(.+)$/);
  if (match) return { title: cleanTitle(match[1].trim()), source: cleanSource(match[2].trim()) };
  return { title: cleanTitle(raw.trim()), source: '뉴스' };
}

function cleanTitle(t) {
  return t.replace(/[\uFFFD\u25A1\u25A0]/g, '').replace(/\s+/g, ' ').trim();
}

let curTab = 'all', allArticles = [], displayCount = 20;

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  curTab = tab;
  displayCount = 20;
  loadFeeds();
}

function timeAgo(d) {
  const m = Math.floor((Date.now() - new Date(d)) / 60000);
  if (m < 1) return '방금';
  if (m < 60) return m + '분 전';
  if (m < 1440) return Math.floor(m / 60) + '시간 전';
  return Math.floor(m / 1440) + '일 전';
}

function isNew(d) { return (Date.now() - new Date(d)) < 3600000; }

function strip(h) {
  return h ? h.replace(/<[^>]*>/g, '').replace(/&[a-z#0-9]+;/gi, ' ')
              .replace(/[\uFFFD\u25A1\u25A0]/g, '').replace(/\s+/g, ' ').trim() : '';
}

async function fetchOne(url) {
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 10000);
    const r = await fetch(`/api/rss?url=${encodeURIComponent(url)}`, { signal: controller.signal });
    clearTimeout(timer);
    if (!r.ok) return [];
    const text = await r.text();
    if (!text || text.length < 50) return [];
    const xml = new DOMParser().parseFromString(text, 'text/xml');
    const items = [...xml.querySelectorAll('item')];
    if (!items.length) return [];
    return items.slice(0, 20).map(item => {
      const raw = item.querySelector('title')?.textContent?.trim() || '';
      const { title, source } = parseTitle(raw);
      return {
        title, source,
        link: item.querySelector('link')?.textContent?.trim() || item.querySelector('guid')?.textContent || '',
        pubDate: item.querySelector('pubDate')?.textContent || new Date().toISOString(),
        description: strip(item.querySelector('description')?.textContent || '')
      };
    }).filter(a => a.title && a.title.length > 2);
  } catch (e) {
    console.error('fetchOne error:', url, e);
    return [];
  }
}

async function loadFeeds() {
  document.getElementById('news').innerHTML = '<div id="loading"><div class="spinner"></div><br>최신 뉴스를 불러오고 있습니다...</div>';
  document.getElementById('article-count').textContent = '뉴스 불러오는 중...';

  const urls = TAB_SOURCES[curTab] || TAB_SOURCES.all;
  const results = await Promise.all(urls.map(url => fetchOne(url)));
  const all = results.flat();
  all.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

  const seen = new Set();
  allArticles = all.filter(a => { if (seen.has(a.title)) return false; seen.add(a.title); return true; });

  if (!allArticles.length) {
    document.getElementById('news').innerHTML = '<div id="loading">잠시 후 다시 시도해주세요.</div>';
    return;
  }

  renderArticles();
  document.getElementById('update-time').textContent = '최종 업데이트 ' + new Date().toLocaleTimeString('ko-KR');

  // AI 요약 + 핫뉴스 호출
  loadAISummary(allArticles.map(a => a.title));
  loadHotNews();
}

function renderArticles() {
  document.getElementById('article-count').innerHTML = `총 <strong>${allArticles.length}</strong>건의 뉴스`;
  const items = allArticles.slice(0, displayCount);
  let html = '';

  items.forEach((a, i) => {
    const ago = timeAgo(a.pubDate);
    const newBadge = isNew(a.pubDate) ? '<span class="new-badge">NEW</span>' : '';

    if (i === 0) {
      html += `
        <a href="${a.link}" target="_blank" rel="noopener" onclick="trackClick('${a.link.replace(/'/g,"\\'")}','${a.title.replace(/'/g,"\\'")}')">
          <div class="card-featured">
            <div class="card-meta">
              <span class="source-badge">${a.source}</span>
              <span class="time-badge">${ago}</span>
              ${newBadge}
            </div>
            <div class="card-title">${a.title}</div>
            ${a.description ? `<div class="card-desc">${a.description.slice(0, 130)}...</div>` : ''}
          </div>
        </a>`;
    } else {
      if (i === 1) html += `<div class="section-label">최신 뉴스</div>`;

      /* 10번째 뉴스 뒤에 광고 자리 (애드핏 승인 후 display:flex 로 변경) */
      if (i === 10) html += `<div class="ad-middle"><!-- 카카오 애드핏 중간 광고 --></div>`;

      html += `
        <a href="${a.link}" target="_blank" rel="noopener" onclick="trackClick('${a.link.replace(/'/g,"\\'")}','${a.title.replace(/'/g,"\\'")}')">
          <div class="card">
            <div class="card-num${i < 4 ? ' hot' : ''}">${i + 1}</div>
            <div class="card-body">
              <div class="card-meta">
                <span class="source-badge">${a.source}</span>
                <span class="time-badge">${ago}</span>
                ${newBadge}
              </div>
              <div class="card-title">${a.title}</div>
            </div>
          </div>
        </a>`;
    }
  });

  if (allArticles.length > displayCount) {
    html += `<button id="load-more" onclick="loadMore()">뉴스 더 보기 (${allArticles.length - displayCount}건 남음) ↓</button>`;
  }

  document.getElementById('news').innerHTML = html;
}

function loadMore() { displayCount += 20; renderArticles(); }

// 뉴스 클릭 추적
function trackClick(url, title) {
  fetch('/api/hot', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ url, title }),
  }).catch(() => {});
}

// 핫뉴스 로드
async function loadHotNews() {
  try {
    const res = await fetch('/api/hot');
    const data = await res.json();
    const hot = data.hot || [];
    if (!hot.length) return;

    const list = hot.map((item, i) => `
      <a href="${item.url}" target="_blank" rel="noopener" onclick="trackClick('${item.url.replace(/'/g,"\\'")}','')">
        <div class="hot-item">
          <span class="hot-rank${i >= 3 ? ' gray' : ''}">${i + 1}</span>
          <span class="hot-title">${item.title}</span>
          <span class="hot-clicks">${item.clicks}회</span>
        </div>
      </a>`).join('');

    document.getElementById('hot-news-list').innerHTML = list;
    document.getElementById('hot-news').style.display = 'block';
  } catch(e) {}
}

// AI 요약 호출 (서버 캐시 1시간)
async function loadAISummary(titles) {
  try {
    const payload = JSON.stringify({ titles: titles.slice(0, 7) });
    const res = await fetch('/api/summarize', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: payload,
    });
    const data = await res.json();
    if (data.summary) {
      renderSummary(data.summary);
    } else {
      document.getElementById('ai-summary-text').textContent = data.error || '요약 실패';
    }
  } catch (e) {
    document.getElementById('ai-summary-text').textContent = '요약을 불러오지 못했습니다.';
  }
}

function renderSummary(text) {
    const stock = text.match(/\[주식시장\]\s*(.+)/)?.[1]?.trim() || '';
    const news  = text.match(/\[주요뉴스\]\s*(.+)/)?.[1]?.trim() || '';
    const etf   = text.match(/\[ETF\]\s*(.+)/)?.[1]?.trim() || '';

    if (stock || news || etf) {
      document.getElementById('ai-summary-text').innerHTML = `
        <div style="display:flex;flex-direction:column;gap:10px;">
          ${stock ? `<div style="display:flex;gap:0;align-items:flex-start;"><span style="color:#e8001a;font-weight:700;font-size:10px;letter-spacing:0.05em;white-space:nowrap;padding-top:3px;min-width:52px;">주식시장</span><span style="flex:1;">${stock}</span></div>` : ''}
          ${news  ? `<div style="display:flex;gap:0;align-items:flex-start;border-top:1px solid rgba(255,255,255,0.08);padding-top:10px;"><span style="color:#e8001a;font-weight:700;font-size:10px;letter-spacing:0.05em;white-space:nowrap;padding-top:3px;min-width:52px;">주요뉴스</span><span style="flex:1;">${news}</span></div>` : ''}
          ${etf   ? `<div style="display:flex;gap:0;align-items:flex-start;border-top:1px solid rgba(255,255,255,0.08);padding-top:10px;"><span style="color:#e8001a;font-weight:700;font-size:10px;letter-spacing:0.05em;white-space:nowrap;padding-top:3px;min-width:52px;">ETF</span><span style="flex:1;">${etf}</span></div>` : ''}
        </div>`;
    } else {
      document.getElementById('ai-summary-text').textContent = text;
    }
}

// 날짜 표시
document.getElementById('ai-summary-date').textContent =
  new Date().toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' });

loadFeeds();
</script>
