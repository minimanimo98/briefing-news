<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>테스트</title></head>
<body>
<div id="test">로딩중</div>
<script>
document.getElementById('test').textContent = '뉴스: JS 작동함!';
fetch('/api/rss?url=https://news.google.com/rss/search?q=ETF')
  .then(r => r.text())
  .then(t => document.getElementById('test').textContent = '성공! ' + t.length + '글자')
  .catch(e => document.getElementById('test').textContent = '에러: ' + e.message);
</script>
</body>
</html>
